<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form - Synaptiq</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="script.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="index.html"><img src="synaptiq-logo.png" alt="Synaptiq" class="brand-logo"></a>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html#home" class="nav-link" data-translate="nav.home">Home</a></li>
        <li><a href="index.html#about" class="nav-link" data-translate="nav.about">About</a></li>
        <li><a href="index.html#services" class="nav-link" data-translate="nav.services">Services</a></li>
        <li><a href="index.html#blog" class="nav-link" data-translate="nav.blog">Blog</a></li>
        <li><a href="index.html#contact" class="nav-link" data-translate="nav.contact">Contact</a></li>
      </ul>
      <div class="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
    </div>
  </nav>

  <main class="container" style="padding-top: 90px; padding-bottom: 40px;">
    <h1 style="margin-bottom:1rem;" data-translate="contact.title">Get In Touch</h1>
    <p style="margin-bottom:1.5rem; color:#666;" data-translate="contact.subtitle">Ready to transform your business with AI? Let's discuss your needs.</p>
    <iframe
      class="n8n-form-embed"
      title="Contact form"
      src="https://n8n.malloantomarchi.tech/form/e8bb9319-ecee-4cd9-a13c-f322033e6f04?theme=light"
      loading="lazy"
      referrerpolicy="no-referrer"
      allowtransparency="true"
      scrolling="no"
      style="height: 1600px; min-height: 1500px; width:100%; border:0;"
    ></iframe>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-text">
          <p data-translate="footer.copyright">© 2025 Synaptiq. All rights reserved.</p>
        </div>
        <div class="footer-links">
          <a href="privacy.html" data-translate="footer.privacy">Privacy Policy</a>
          <a href="cookies.html" data-translate="footer.cookies">Cookie Policy</a>
          <a href="terms.html" data-translate="footer.terms">Terms of Service</a>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
